name: Production health check

# Curls the homepage and every public directory route on production and
# fails if any returns a non-200, then asserts a sample of published
# listings render on their category pages (and unpublished ones don't).
# Optional dispatch inputs add per-run assertions (one "route|string" per
# line) checked with retries, so staged imports can be verified without
# editing this file. Dispatch from the Actions tab for a 30-second smoke test.
on:
  workflow_dispatch:
    inputs:
      expect:
        description: 'Extra MUST-CONTAIN checks, one "/route|text" per line'
        required: false
        default: ''
      absent:
        description: 'Extra MUST-NOT-CONTAIN checks, one "/route|text" per line'
        required: false
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check production routes
        run: |
          BASE="https://truckinglifewithshawn.com"
          ROUTES=(
            /
            /directory
            /directory/parking
            /directory/truck-stops
            /directory/cat-scales
            /directory/truck-washes
            /directory/tire-repair
            /directory/weigh-stations
            /directory/hotels-truck-parking
            /directory/cdl-schools
            /directory/roadside-service
            /directory/georgia
            /directory/tennessee
            /directory/i75
            /directory/i75/exit-201
            /directory/i75/exit-369
          )
          fail=0
          for route in "${ROUTES[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE$route")
            echo "$code $BASE$route"
            if [ "$code" != "200" ]; then fail=1; fi
          done
          exit $fail

      - name: Check published listings render (and unpublished don't)
        run: |
          BASE="https://truckinglifewithshawn.com"
          fail=0
          expect() {
            if curl -s --max-time 30 "$BASE$1" | grep -qF "$2"; then
              echo "OK   $1 contains \"$2\""
            else
              echo "FAIL $1 missing \"$2\""; fail=1
            fi
          }
          absent() {
            if curl -s --max-time 30 "$BASE$1" | grep -qF "$2"; then
              echo "FAIL $1 shows unpublished \"$2\""; fail=1
            else
              echo "OK   $1 hides \"$2\""
            fi
          }
          expect /directory/cat-scales "Pilot Travel Center #4558"
          expect /directory/hotels-truck-parking "Days Inn"
          expect /directory/tire-repair "BestDrive"
          expect /directory/truck-stops "Adel Truck Plaza"
          expect /directory/truck-stops "Big Foot Travel Center"
          expect /directory/truck-stops "TA Lake Park"
          expect /directory/roadside-service "24/7 Diesel"
          expect /directory/truck-washes "Blue Beacon"
          expect /directory/weigh-stations "Georgia DPS Weigh Station"
          absent /directory/truck-stops "Pathway Travel Plaza"
          absent /directory/truck-stops "A-1 Truck Stop"
          absent /directory/truck-stops "JP Truck Center"
          absent /directory/truck-stops "America&#x27;s Truck Stop"
          absent /directory/truck-washes "S &amp; B Truck Wash"
          exit $fail

      - name: Per-run assertions (dispatch inputs, ISR-aware retries)
        if: ${{ github.event.inputs.expect != '' || github.event.inputs.absent != '' }}
        env:
          EXPECT: ${{ github.event.inputs.expect }}
          ABSENT: ${{ github.event.inputs.absent }}
        run: |
          BASE="https://truckinglifewithshawn.com"
          check_all() {
            local fail=0
            while IFS='|' read -r route text; do
              [ -z "$route" ] && continue
              if curl -s --max-time 30 "$BASE$route" | grep -qF "$text"; then
                echo "OK   $route contains \"$text\""
              else
                echo "MISS $route missing \"$text\""; fail=1
              fi
            done <<< "$EXPECT"
            while IFS='|' read -r route text; do
              [ -z "$route" ] && continue
              if curl -s --max-time 30 "$BASE$route" | grep -qF "$text"; then
                echo "SHOW $route shows \"$text\" (must be hidden)"; fail=1
              else
                echo "OK   $route hides \"$text\""
              fi
            done <<< "$ABSENT"
            return $fail
          }
          # ISR pages refresh on demand (5-min TTL): retry so a stale first
          # response doesn't fail a check that passes once regenerated.
          for attempt in 1 2 3 4; do
            echo "--- attempt $attempt ---"
            if check_all; then exit 0; fi
            [ "$attempt" != "4" ] && sleep 45
          done
          echo "Assertions still failing after 4 attempts."
          exit 1
