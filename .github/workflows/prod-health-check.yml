name: Production health check

# Curls the homepage and every public directory route on production and
# fails if any returns a non-200, then asserts a sample of published
# listings render on their category pages (and unpublished ones don't).
# Dispatch manually from the Actions tab for a 30-second smoke test.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check production routes
        run: |
          BASE="https://truckinglifewithshawn.com"
          ROUTES=(
            /
            /directory
            /directory/parking
            /directory/truck-stops
            /directory/cat-scales
            /directory/truck-washes
            /directory/tire-repair
            /directory/weigh-stations
            /directory/hotels-truck-parking
            /directory/cdl-schools
            /directory/roadside-service
          )
          fail=0
          for route in "${ROUTES[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE$route")
            echo "$code $BASE$route"
            if [ "$code" != "200" ]; then fail=1; fi
          done
          exit $fail

      - name: Check published listings render (and unpublished don't)
        run: |
          BASE="https://truckinglifewithshawn.com"
          fail=0
          expect() { # route, string that MUST appear
            if curl -s --max-time 30 "$BASE$1" | grep -qF "$2"; then
              echo "OK   $1 contains \"$2\""
            else
              echo "FAIL $1 missing \"$2\""; fail=1
            fi
          }
          absent() { # route, string that must NOT appear
            if curl -s --max-time 30 "$BASE$1" | grep -qF "$2"; then
              echo "FAIL $1 shows unpublished \"$2\""; fail=1
            else
              echo "OK   $1 hides \"$2\""
            fi
          }
          expect /directory/cat-scales "Pilot Travel Center #4558"
          expect /directory/hotels-truck-parking "Days Inn"
          expect /directory/tire-repair "BestDrive"
          expect /directory/truck-stops "Adel Truck Plaza"
          expect /directory/roadside-service "24/7 Diesel"
          absent /directory/truck-stops "Pathway Travel Plaza"
          absent /directory/truck-stops "A-1 Truck Stop"
          exit $fail
