name: preview-crawl

# Authoritative internal-link crawl against the Netlify deploy preview.
# The development sandbox cannot reach *.netlify.app, so the crawl of
# DB-backed routes (e.g. /knowledge/<category>) runs here instead.
on:
  push:
    branches: [claude/platform-activation, claude/launch-readiness]
    paths: ['.github/workflows/preview-crawl.yml', 'scripts/crawl-links.mjs']
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to crawl'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wait for preview to serve this commit
        run: |
          # Pick the deploy preview for this branch's PR unless a URL is given.
          case "${{ github.ref_name }}" in
            claude/launch-readiness) DEFAULT="https://deploy-preview-162--lighthearted-clafoutis-144512.netlify.app" ;;
            *) DEFAULT="https://deploy-preview-161--lighthearted-clafoutis-144512.netlify.app" ;;
          esac
          URL="${{ github.event.inputs.base_url }}"
          URL="${URL:-$DEFAULT}"
          echo "BASE_URL=$URL" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "preview never returned 200"; exit 1
      - name: Crawl internal links
        run: node scripts/crawl-links.mjs "$BASE_URL"
